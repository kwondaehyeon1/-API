<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 급식 - 자운고등학교</title>
    <!-- 고급스럽고 모던한 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header>
            <div class="tag">School Meal</div>
            <h1>오늘의 급식</h1>
            <p class="subtitle">자운고등학교</p>
        </header>
        
        <main class="glass-panel">
            <div class="date-selector">
                <button id="prev-day" class="icon-btn" aria-label="이전 날짜">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <div class="date-display">
                    <input type="date" id="date-picker" class="date-input" aria-label="날짜 선택">
                    <span id="relative-day" class="relative-day">오늘</span>
                </div>
                <button id="next-day" class="icon-btn" aria-label="다음 날짜">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>
            
            <div id="loading" class="state-container">
                <div class="spinner"></div>
                <p>메뉴를 불러오는 중입니다...</p>
            </div>
            
            <div id="meal-content" class="meal-content hidden">
                <ul id="menu-list" class="menu-list">
                    <!-- 메뉴 아이템 동적 생성 -->
                </ul>
                <div class="calorie-badge">
                    <span class="icon">🔥</span>
                    <span id="calories-val" class="value">-- Kcal</span>
                </div>
            </div>
            
            <div id="error-message" class="state-container hidden">
                <div class="error-icon">📭</div>
                <p id="error-text">이 날의 급식 정보가 없습니다.</p>
            </div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
